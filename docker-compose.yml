services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      APP_ENV: development
      DB_HOST: postgres
      DB_USER: taskuser
      DB_PASSWORD: secret
      DB_NAME: tasks

  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_USER: taskuser
      POSTGRES_DB:   tasks

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
